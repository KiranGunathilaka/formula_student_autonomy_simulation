# Topic remapping configuration for cone detection
# This file maps internal node topics to external ROS topics

remappings:
  # Camera input
  camera_input: "/camera/image_raw"
  
  # Pointcloud input (if using pointcloud-based detection)
  pointcloud_input: "/velodyne_points"
  
  # Detection output
  cone_detections: "/detected_cones"
  
  # Debug/visualization topics
  debug_image: "/cone_detection/debug_image"
  debug_bboxes: "/cone_detection/bboxes"
  
  # TF frames
  camera_frame: "camera_link"
  map_frame: "map"
  base_frame: "base_link"
